<!DOCTYPE html>



<html lang="en">



<head>



    <meta charset="UTF-8">



    <meta name="viewport" content="width=device-width, initial-scale=1.0">



    <title>Video Game Sales Prediction Model - Presentation</title>



    <link rel="preconnect" href="https://fonts.googleapis.com">



    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>



    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">



    <style>



        * { margin: 0; padding: 0; box-sizing: border-box; }



        body {



            background: url('desk.png') center/cover fixed no-repeat;



            color: #e0e0e0;



            font-family: 'Merriweather', serif;



            min-height: 100vh;



            display: flex;



            flex-direction: column;



            align-items: center;



            justify-content: center;



        }



        .slideshow-container {



            position: relative;



            width: 95vw;



            max-width: 1200px;



            margin: 5px auto;



        }



        .slide {



            display: none;



            width: 100%;



            animation: fadeIn 0.4s ease-in-out;



        }



        .slide.active { display: block; }



        .slide img {

            width: auto;

            max-width: 100%;

            height: auto;

            max-height: calc(100vh - 140px);

            display: block;

            margin: 0 auto;

            border-radius: 8px;

            box-shadow: 0 8px 32px rgba(0,0,0,0.5);

        }



        @keyframes fadeIn {



            from { opacity: 0; }



            to { opacity: 1; }



        }



        .controls {



            display: flex;



            align-items: center;



            justify-content: center;



            gap: 24px;



            margin-top: 5px;

            padding: 6px;



        }



        .nav-btn {



            background: rgba(255,255,255,0.1);



            border: 1px solid rgba(255,255,255,0.2);



            color: #e0e0e0;



            font-size: 24px;



            width: 50px;



            height: 50px;



            border-radius: 50%;



            cursor: pointer;



            transition: all 0.2s;



            display: flex;



            align-items: center;



            justify-content: center;



        }



        .nav-btn:hover {



            background: rgba(255,255,255,0.2);



            border-color: rgba(255,255,255,0.4);



        }



        .slide-counter {



            font-family: 'Special Elite', cursive;



            font-size: 18px;



            color: #aaa;



            min-width: 80px;



            text-align: center;



        }



        .title-bar {



            text-align: center;



            padding: 10px;



        }



        .title-bar h1 {



            font-family: 'Special Elite', cursive;



            font-size: 24px;



            color: #e0e0e0;



            letter-spacing: 2px;



        }



        .title-bar p {



            font-family: 'Crimson Text', serif;



            color: #888;



            font-size: 14px;



            margin-top: 4px;



        }



        .back-link {



            color: #888;



            text-decoration: none;



            font-family: 'Crimson Text', serif;



            font-size: 14px;



            margin-top: 10px;



            display: inline-block;



            transition: color 0.2s;



        }



        .back-link:hover { color: #ccc; }



        .fullscreen-btn {



            background: none;



            border: 1px solid rgba(255,255,255,0.15);



            color: #888;



            font-size: 13px;



            padding: 6px 14px;



            border-radius: 4px;



            cursor: pointer;



            font-family: 'Crimson Text', serif;



            transition: all 0.2s;



        }



        .fullscreen-btn:hover {



            color: #ccc;



            border-color: rgba(255,255,255,0.3);



        }



    </style>



</head>



<body>



    <div class="title-bar">



        <h1>VIDEO GAME SALES PREDICTION MODEL</h1>



        <p>University of Chicago DSI - Machine Learning I - Final Project Winter 2026</p>



    </div>







    <div class="slideshow-container" id="slideshow">



        <div class="slide active"><img src="slides/slide-01.jpg" alt="Slide 1"></div>



        <div class="slide"><img src="slides/slide-02.jpg" alt="Slide 2"></div>



        <div class="slide"><img src="slides/slide-03.jpg" alt="Slide 3"></div>



        <div class="slide"><img src="slides/slide-04.jpg" alt="Slide 4"></div>



        <div class="slide"><img src="slides/slide-05.jpg" alt="Slide 5"></div>



        <div class="slide"><img src="slides/slide-06.jpg" alt="Slide 6"></div>



        <div class="slide"><img src="slides/slide-07.jpg" alt="Slide 7"></div>



        <div class="slide"><img src="slides/slide-08.jpg" alt="Slide 8"></div>



        <div class="slide"><img src="slides/slide-09.jpg" alt="Slide 9"></div>



        <div class="slide"><img src="slides/slide-10.jpg" alt="Slide 10"></div>



        <div class="slide"><img src="slides/slide-11.jpg" alt="Slide 11"></div>



    </div>







    <div class="controls">



        <button class="nav-btn" onclick="changeSlide(-1)">&larr;</button>



        <span class="slide-counter" id="counter">1 / 11</span>



        <button class="nav-btn" onclick="changeSlide(1)">&rarr;</button>



        <button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>



    </div>







    <a href="projects.html" class="back-link">&larr; Back to Projects</a>







    <script>



        let current = 0;



        const slides = document.querySelectorAll('.slide');



        const counter = document.getElementById('counter');



        const total = slides.length;







        function showSlide(n) {



            slides[current].classList.remove('active');



            current = (n + total) % total;



            slides[current].classList.add('active');



            counter.textContent = (current + 1) + ' / ' + total;



        }







        function changeSlide(dir) {



            showSlide(current + dir);



        }







        function goFullscreen() {



            const el = document.getElementById('slideshow');



            if (el.requestFullscreen) el.requestFullscreen();



            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();



        }







        document.addEventListener('keydown', (e) => {



            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); }



            if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }



            if (e.key === 'f' || e.key === 'F') goFullscreen();



        });



    </script>



</body>



</html>
